<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FDE08B" />
      <stop offset="50%" stop-color="#D4AF37" />
      <stop offset="100%" stop-color="#997A15" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Subtle Outer Ring (Eucharist/Aura) -->
  <circle cx="256" cy="256" r="200" fill="none" stroke="url(#goldGrad)" stroke-width="2" opacity="0.3"/>
  
  <!-- Main Inner Ring -->
  <circle cx="256" cy="256" r="160" fill="none" stroke="url(#goldGrad)" stroke-width="12" opacity="0.85"/>
  
  <!-- Abstract Cross / Divine Light Burst -->
  <!-- A 4-pointed star created with bezier curves to look elegant and modern -->
  <path d="M 256 30 C 256 230, 230 256, 30 256 C 230 256, 256 282, 256 482 C 256 282, 282 256, 482 256 C 282 256, 256 230, 256 30 Z" fill="url(#goldGrad)" filter="url(#glow)"/>
  
  <!-- Center Core (The Host / Divine Presence) -->
  <circle cx="256" cy="256" r="32" fill="#FFFFFF" opacity="0.95" filter="url(#glow)"/>
</svg>
